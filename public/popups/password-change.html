<div id="passwordModal" class="modal-overlay">
	<div class="modal-box">
		<h2>Change Password</h2>

		<div id="passwordAlert" class="modal-alert" style="display:none;"></div>

		<form id="passwordForm">
			<label>Current Password</label>
			<input type="password" id="currentPassword" required>

			<label>New Password</label>
			<input type="password" id="newPassword" required>

			<label>Confirm New Password</label>
			<input type="password" id="confirmPassword" required>

			<div id="strengthMeter" class="strength-meter">
				<div id="strengthBar"></div>
			</div>
			
			<div class="modal-buttons">
				<button type="submit" id="savePassBtn" class="btn-primary">Update</button>
				<button type="button" id="cancelPassBtn" class="btn-secondary">Cancel</button>
			</div>
		</form>
	</div>
</div>
