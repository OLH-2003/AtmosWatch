<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.what3words.com/javascript-components/v3/what3words.js"></script>

<div id="assetCreateModal" class="modal-overlay">
	<div class="modal-box" style="width:450px;">
		<h2>Create New Location</h2>

		<div id="assetCreateAlert" class="modal-alert" style="display:none;"></div>

		<form id="assetCreateForm">
			<div id="name_type">
				<div class="field" style="width:60%;">
					<label>Location Name</label>
					<input type="text" id="newAssetName" required>
				</div>
				
				<div class="space" style="width:5%;"></div>

				<div class="field" style="width:35%;">
					<label>Type</label>
					<select name="assetType" id="newAssetType" required>
						<option value="PS">Power Station</option>
						<option value="SS">Substation</option>
						<option value="HS">Hydro Power Site</option>
						<option value="RS">Radio Tower</option>
						<option value="WF">Windfarm</option>
					</select>
				</div>
			</div>

			<div id="address_postcode">
				<div class="field" style="width:60%;">
					<label>Address</label>
					<input type="text" id="newAssetAddress">
				</div>
				
				<div class="space" style="width:5%;"></div>

				<div class="field" style="width:35%;">
					<label>Postcode</label>
					<input type="text" id="newAssetPostcode">
				</div>
			</div>

			<div class="field">
				<label>What3Words</label>
				<input type="text" id="newAssetW3W" readonly>
			</div>

			<div id="Coords">
				<div class="field" style="width:47.5%;">
					<label for="latitude">Latitude:</label>
					<input type="text" id="latitude" name="latitude" readonly required>
				</div>

				<div class="space" style="width:5%;"></div>

				<div class="field" style="width:47.5%;">
					<label for="longitude">Longitude:</label>
					<input type="text" id="longitude" name="longitude" readonly required>
				</div>
			</div>
			<div id="map" style="width:100%;height:300px;margin-top:10px;"></div>

			<script>
				let map;
				let marker;
				function initAssetMap() {
					if (map) return;

					map = L.map('map').setView([51.505, -0.09], 13);

					L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
						attribution: '&copy; OpenStreetMap contributors'
					}).addTo(map)

					map.on('click', function(e) {
						const lat = e.latlng.lat.toFixed(6);
						const lng = e.latlng.lng.toFixed(6);
										
						document.getElementById('latitude').value = lat;
						document.getElementById('longitude').value = lng;
					
						if (marker) {
							marker.setLatLng(e.latlng);
						} else {
							marker = L.marker(e.latlng).addTo(map);
						}

						window.what3words.convertTo3wa({ lat, lng })
							.then(response => {
								document.getElementById('newAssetW3W').value = response.words;
							}).catch(err => {
								console.error("W3W error: ", err);
								document.getElementById('newAssetW3W').value = "Error";
							});
					});
				}

				(function setupModalMapWatcher() {
					const modal = document.getElementById("assetCreateModal");
					if (!modal) return;

					const observer = new MutationObserver(() => {
						const isVisible = window.getComputedStyle(modal).display !== "none";
						if (isVisible) {
							initAssetMap();
							setTimeout(() => {
								if (map) map.invalidateSize();
							}, 150);
						}
					});
					
					observer.observe(modal, { attributes: true, attributeFilter: ["style", "class"] });

					const alreadyVisible = window.getComputedStyle(modal).display !== "none";
					if (alreadyVisible) {
						initAssetMap();
						setTimeout(() => {
							if (map) map.invalidateSize();
						}, 150);
					}
				})();
			</script>


			<div class="modal-buttons">
				<button type="submit" class="btn-primary">Create</button>
				<button type="button" id="cancelAssetCreateBtn" class="btn-secondary">Cancel</button>
			</div>
		</form>
	</div>
</div>
